name: very_slow tests (manual)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  very_slow:
    name: pytest -m very_slow (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run very_slow tests (K_5 Shapley A_2 ablation, ~135 min)
        run: pytest -v -r x -m very_slow
